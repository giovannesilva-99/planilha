<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano de Corrida | Grupo BASE</title>
<style>
  :root {
    --navy: #1E2D4A;
    --blue: #1C75BC;
    --blue-light: #EBF3FA;
    --gray: #6D6E71;
    --light: #F8F9FA;
    --white: #FFFFFF;
    --border: #E2E8F0;
    --success: #10B981;
    --gold: #D97706;
    --gold-light: #FEF3C7;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--light);
    color: #2D3748;
    line-height: 1.5;
    padding: 20px 12px;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    background: var(--white);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  header {
    background: linear-gradient(135deg, var(--navy) 0%, #152035 100%);
    padding: 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    text-align: center;
  }

  @media (min-width: 600px) {
    header {
      flex-direction: row;
      justify-content: space-between;
      text-align: left;
    }
  }

  header img {
    height: 45px;
    width: auto;
    object-fit: contain;
  }

  header .titulo h1 {
    color: var(--white);
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  header .titulo p {
    margin-top: 4px;
    font-size: 13px;
    color: #94A3B8;
    font-weight: 500;
  }

  /* Estrutura de Tabela Pró para Desktops */
  .table-responsive {
    width: 100%;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    display: none; /* Escondido no mobile, ativado via Media Query */
  }

  @media (min-width: 768px) {
    table {
      display: table;
    }
  }

  thead th {
    background: var(--blue-light);
    color: var(--navy);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 16px 20px;
    text-align: left;
    border-bottom: 2px solid var(--border);
  }

  thead th:first-child {
    width: 130px;
    text-align: center;
  }

  tbody tr {
    transition: background 0.2s ease;
  }

  tbody tr:hover {
    background-color: #F8FAFC;
  }

  tbody td {
    padding: 18px 20px;
    font-size: 14px;
    vertical-align: top;
    border-bottom: 1px solid var(--border);
  }

  /* Tags de Fase */
  .semana-cell {
    text-align: center;
    border-right: 1px solid var(--border);
    background: #FAFAFA;
  }

  .num-semana {
    font-size: 22px;
    font-weight: 800;
    color: var(--navy);
    display: block;
    line-height: 1.1;
  }

  .tag-fase {
    display: inline-block;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    margin-top: 6px;
    letter-spacing: 0.3px;
  }

  .fase-adaptacao { background: #E0F2FE; color: #0369A1; }
  .fase-condicionante { background: #FEF3C7; color: #B45309; }
  .fase-aperfeicoamento { background: #E0E7FF; color: #4338CA; }
  .fase-objetivo { background: #D1FAE5; color: #065F46; }

  /* Lista de Exercícios Funcional */
  .item-treino {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
    cursor: pointer;
  }

  .item-treino:last-child {
    margin-bottom: 0;
  }

  .item-treino input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border: 2px solid var(--blue);
    border-radius: 4px;
    outline: none;
    margin-top: 3px;
    cursor: pointer;
    transition: all 0.2s ease;
    flex-shrink: 0;
    position: relative;
  }

  .item-treino input[type="checkbox"]:checked {
    background-color: var(--success);
    border-color: var(--success);
  }

  .item-treino input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 4px;
    top: 1px;
    width: 4px;
    height: 8px;
    border: solid white;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .item-treino input[type="checkbox"]:checked + span {
    color: var(--gray);
    text-decoration: line-through;
  }

  /* Destaque para o grande dia */
  .card-prova {
    background: linear-gradient(135deg, var(--gold-light) 0%, #FDE68A 100%);
    border: 1px dashed var(--gold);
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    color: #92400E;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 1px;
    box-shadow: 0 4px 12px rgba(217, 119, 6, 0.1);
  }

  /* Layout em Cards (Mobile e Tablets verticais) */
  .mobile-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 16px;
  }

  @media (min-width: 768px) {
    .mobile-cards {
      display: none;
    }
  }

  .card-semana {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  }

  .card-semana-header {
    background: #F1F5F9;
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }

  .card-semana-titulo {
    font-weight: 800;
    color: var(--navy);
    font-size: 16px;
  }

  .card-dia-bloco {
    padding: 14px 16px;
    border-bottom: 1px solid #F1F5F9;
  }

  .card-dia-bloco:last-child {
    border-bottom: none;
  }

  .card-dia-nome {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray);
    background: #FAFAFA;
    border-top: 1px solid var(--border);
  }
</style>
</head>
<body>

          <td>

            <label class="item-treino"><input type="checkbox"><span>Alternar: 8x (2 min corrida leve / 2 min caminhada)</span></label>
          </td>
          <td>

          </td>
          <td>

            <label class="item-treino"><input type="checkbox"><span>Corrida leve: 20 min</span></label>
          </td>
        </tr>
        <tr>
          <td class="semana-cell">
            <span class="num-semana">4</span>

          </td>
          <td>

        <tr>

          </td>

        <tr>

  <div class="mobile-cards">
    </div>

  <footer>
    Grupo BASE &middot; Foco, Constância e Evolução.
  </footer>
</div>

<script>
  // Script simples para gerar os cards mobile automaticamente com base na tabela desktop
  // Isso garante performance e que você só precise editar os treinos em um único lugar (na tabela acima)!
  document.addEventListener("DOMContentLoaded", function() {
    const tableRows = document.querySelectorAll("tbody tr");
    const mobileContainer = document.querySelector(".mobile-cards");
    const headers = ["Terça-Feira", "Quinta-Feira", "Sábado"];

    tableRows.forEach(row => {
      const numSemana = row.querySelector(".num-semana").innerText;
      const tagFase = row.querySelector(".tag-fase").outerHTML;
      const tdDias = row.querySelectorAll("td:not(.semana-cell)");
      
      let cardHtml = `
        <div class="card-semana">
          <div class="card-semana-header">
            <span class="card-semana-titulo">Semana ${numSemana}</span>
            ${tagFase}
          </div>
      `;

      tdDias.forEach((td, index) => {
        cardHtml += `
          <div class="card-dia-bloco">
            <div class="card-dia-nome">${headers[index]}</div>
            <div>${td.innerHTML}</div>
          </div>
        `;
      });

      cardHtml += `</div>`;
      mobileContainer.innerHTML += cardHtml;
    });
  });
</script>
</body>
</html>
